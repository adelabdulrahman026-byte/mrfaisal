<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-900">
    <div class="bg-white w-full max-w-md p-8 rounded-[2rem] shadow-2xl text-center">
        <h1 class="text-3xl font-black text-slate-800 mb-6">حساب جديد</h1>
        <form onsubmit="handleReg(event)" class="space-y-4">
            <input type="text" id="user" required placeholder="اسم المستخدم (إنجليزي)" class="w-full p-4 rounded-xl border-2 border-slate-100 bg-slate-50 outline-none focus:border-orange-500">
            <input type="password" id="pass" required placeholder="كلمة المرور" class="w-full p-4 rounded-xl border-2 border-slate-100 bg-slate-50 outline-none focus:border-orange-500">
            <button type="submit" id="btn" class="w-full bg-orange-500 text-white font-bold py-4 rounded-xl">إنشاء</button>
        </form>
        <div class="mt-4"><a href="login.html" class="text-teal-600 font-bold text-sm">لديك حساب؟ دخول</a></div>
    </div>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfqzIQ_MMoOOXebPNqRlCi_86IUbzppdTP6aUPjC64SL3Dibr7HUulvJH4P7IL4w/exec";
        function handleReg(e) {
            e.preventDefault(); const btn = document.getElementById('btn'); btn.innerText = 'جاري...'; btn.disabled = true;
            fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "register", username: document.getElementById('user').value, password: document.getElementById('pass').value }) })
            .then(res => res.json()).then(data => {
                if(data.status === "success") { btn.className = "w-full bg-green-500 text-white font-bold py-4 rounded-xl"; btn.innerText = '✅ تم الإنشاء'; setTimeout(() => window.location.href = "login.html", 1500); }
                else { alert('❌ ' + data.message); btn.innerText = 'إنشاء'; btn.disabled = false; }
            }).catch(() => { alert("خطأ اتصال"); btn.innerText = 'إنشاء'; btn.disabled = false; });
        }
    </script>
</body>
</html>

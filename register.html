<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-900">
    <div class="bg-white w-full max-w-md p-6 rounded-[2rem] shadow-2xl text-center">
        <h1 class="text-2xl font-black text-slate-800 mb-4">إنشاء حساب جديد</h1>
        <form onsubmit="handleReg(event)" class="space-y-3 text-right">
            <input type="text" id="name" required placeholder="الاسم (عربي أو إنجليزي)" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-orange-500">
            <input type="tel" id="phone" required placeholder="رقم الهاتف الأساسي" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-orange-500">
            <input type="password" id="pass" required placeholder="كلمة المرور" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-orange-500">
            <input type="text" id="gov" required placeholder="المحافظة" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-orange-500">
            <input type="text" id="address" required placeholder="العنوان التفصيلي" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-orange-500">
            <input type="tel" id="altPhone" placeholder="رقم هاتف بديل (اختياري)" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-orange-500">
            
            <button type="submit" id="btn" class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl mt-2">تأكيد التسجيل</button>
        </form>
        <div class="mt-4"><a href="login.html" class="text-teal-600 font-bold text-sm">لديك حساب؟ سجل دخول</a></div>
    </div>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyE7ABQvBd_kbj1VVJwwqU__44ICYupDLeB9avakXBGf32fNIkB_-tiXwrqNXqRyho/exec";
        function handleReg(e) {
            e.preventDefault(); const btn = document.getElementById('btn'); btn.innerText = 'جاري...'; btn.disabled = true;
            const payload = { action: "register", name: document.getElementById('name').value, phone: document.getElementById('phone').value, password: document.getElementById('pass').value, gov: document.getElementById('gov').value, address: document.getElementById('address').value, altPhone: document.getElementById('altPhone').value };
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }).then(res => res.json()).then(data => {
                if(data.status === "success") { btn.className = "w-full bg-green-500 text-white font-bold py-3 rounded-xl mt-2"; btn.innerText = '✅ تم الإنشاء'; setTimeout(() => window.location.href = "login.html", 1500); }
                else { alert('❌ ' + data.message); btn.innerText = 'تأكيد التسجيل'; btn.disabled = false; }
            }).catch(() => { alert("خطأ اتصال"); btn.disabled = false; });
        }
    </script>
</body>
</html>

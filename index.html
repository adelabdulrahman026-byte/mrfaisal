<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فيصل أكاديمي | المنصة التعليمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.min.js" defer></script>
    <script>
      window.tailwind.config = { darkMode: 'class', theme: { extend: { colors: { teal: { 500: '#14b8a6' }, orange: { 500: '#f97316' } } } } }
    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); }
        .dark .glass-nav { background: rgba(15, 23, 42, 0.85); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hover-lift:hover { transform: translateY(-8px); box-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.15); }
        .slide { opacity: 0; transition: opacity 1.2s; position: absolute; width: 100%; height: 100%; object-fit: cover; }
        .slide.active { opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-white transition-colors duration-500">

    <nav class="glass-nav fixed w-full z-50 top-0 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="text-2xl hover:text-orange-500"><i class="fas fa-bars"></i></button>
                <h1 class="text-2xl font-black bg-gradient-to-r from-teal-600 to-orange-500 bg-clip-text text-transparent hidden sm:block">فيصل أكاديمي</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="text-xl hover:text-teal-500"><i class="fas fa-moon" id="themeIcon"></i></button>
                <div id="loginContainer">
                    <a href="login.html" class="bg-slate-800 dark:bg-white dark:text-slate-900 text-white px-6 py-2 rounded-full font-bold text-sm hover:bg-orange-500">تسجيل الدخول</a>
                </div>
            </div>
        </div>
    </nav>

    <div id="sidebar" class="fixed top-0 right-[-320px] h-full w-[300px] bg-white dark:bg-slate-800 shadow-2xl z-[60] p-8 transition-all duration-500">
        <button onclick="toggleSidebar()" class="absolute top-6 left-6 text-2xl hover:text-orange-500"><i class="fas fa-times"></i></button>
        <ul class="space-y-4 font-bold text-lg mt-10">
            <li><a href="talb" class="flex items-center gap-4 p-3 hover:bg-orange-50 dark:hover:bg-slate-700 rounded-xl"><i class="fas fa-user-shield text-teal-500"></i>متابعة ولي الأمر</a></li>
            <li><a href="cors" class="flex items-center gap-4 p-3 hover:bg-teal-50 dark:hover:bg-slate-700 rounded-xl"><i class="fas fa-laptop-code text-teal-500"></i>منصتنا التعليمية</a></li>
            <li><a href="moayed" class="flex items-center gap-4 p-3 hover:bg-blue-50 dark:hover:bg-slate-700 rounded-xl"><i class="fas fa-calendar-alt text-teal-500"></i>مواعيدنا</a></li>
            <li><a href="hw" class="flex items-center gap-4 p-3 hover:bg-purple-50 dark:hover:bg-slate-700 rounded-xl"><i class="fas fa-book-open text-teal-500"></i>الواجبات</a></li>
            <li><a href="exam" class="flex items-center gap-4 p-3 hover:bg-rose-50 dark:hover:bg-slate-700 rounded-xl"><i class="fas fa-file-signature text-teal-500"></i>امتحاناتنا</a></li>
        </ul>
    </div>
    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/40 z-50 hidden"></div>

    <div class="relative w-full h-[60vh] mt-0 bg-slate-900">
        <div id="slider-container" class="w-full h-full"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent flex flex-col justify-end pb-20 px-10 text-white">
            <h2 class="text-4xl md:text-6xl font-black mb-4">فيصل أكاديمي</h2>
            <p class="text-xl text-slate-300">المنصة الأقوى للبكالوريا</p>
        </div>
    </div>

    <div class="container mx-auto px-4 relative z-10 -mt-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="talb" class="hover-lift bg-gradient-to-br from-orange-500 to-red-600 rounded-3xl p-8 shadow-2xl text-white flex justify-between items-center">
                <div><i class="fas fa-user-shield text-3xl mb-2"></i><h3 class="text-3xl font-black">متابعة ولي الأمر</h3></div>
            </a>
            <a href="cors" class="hover-lift bg-gradient-to-br from-teal-500 to-cyan-600 rounded-3xl p-8 shadow-2xl text-white flex justify-between items-center">
                <div><i class="fas fa-laptop-code text-3xl mb-2"></i><h3 class="text-3xl font-black">المنصة التعليمية</h3></div>
            </a>
        </div>
    </div>

    <div class="container mx-auto px-4 py-16">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
            <a href="moayed.html" class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-lg font-bold hover:text-blue-500"><i class="fas fa-calendar-check text-3xl block mb-2"></i>مواعيدنا</a>
            <a href="hw.html" class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-lg font-bold hover:text-purple-500"><i class="fas fa-tasks text-3xl block mb-2"></i>الواجبات</a>
            <a href="exam.html" class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-lg font-bold hover:text-rose-500"><i class="fas fa-stopwatch text-3xl block mb-2"></i>امتحاناتنا</a>
            <a href="#" onclick="checkStore()" class="bg-slate-800 text-white p-6 rounded-3xl shadow-lg font-bold hover:bg-orange-500"><i class="fas fa-shopping-bag text-3xl block mb-2 text-orange-400"></i>المتجر</a>
        </div>
    </div>

    <div class="bg-slate-100 dark:bg-slate-800 py-10 text-center">
        <div class="flex justify-center gap-4 text-3xl text-white">
            <a href="#" id="wa" class="bg-green-500 w-16 h-16 rounded-2xl flex items-center justify-center hover:scale-110"><i class="fab fa-whatsapp"></i></a>
            <a href="#" id="fb" class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center hover:scale-110"><i class="fab fa-facebook-f"></i></a>
            <a href="#" id="yt" class="bg-red-600 w-16 h-16 rounded-2xl flex items-center justify-center hover:scale-110"><i class="fab fa-youtube"></i></a>
            <a href="#" id="tk" class="bg-black w-16 h-16 rounded-2xl flex items-center justify-center hover:scale-110"><i class="fab fa-tiktok"></i></a>
        </div>
    </div>

    <footer class="bg-slate-900 text-slate-400 py-10 text-center text-sm">
        <p>جميع الحقوق محفوظة © 2026</p>
        <a href="https://wa.me/201093139047" class="text-teal-400 block mt-2">Designed by Abdulrahman Adel</a>
    </footer>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfqzIQ_MMoOOXebPNqRlCi_86IUbzppdTP6aUPjC64SL3Dibr7HUulvJH4P7IL4w/exec";

        window.OneSignal = window.OneSignal || [];
        OneSignal.push(function() {
            OneSignal.init({ 
                appId: "8e36161f-8906-41f3-b0b8-3e272167065b", notifyButton: { enable: true },
                promptOptions: { slidedown: { prompts: [{ type: "push", autoPrompt: true, text: { actionMessage: "فعل الإشعارات ليصلك كل جديد", acceptButton: "موافق", cancelButton: "لا" } }] } }
            });
            OneSignal.showSlidedownPrompt();
        });

        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('overlay');
            if (sidebar.style.right === '0px') { sidebar.style.right = '-320px'; overlay.classList.add('hidden'); }
            else { sidebar.style.right = '0px'; overlay.classList.remove('hidden'); }
        }

        function checkStore() {
            if(localStorage.getItem("isLoggedIn")) window.location.href = "store.html";
            else { alert("يرجى تسجيل الدخول أولاً"); window.location.href = "login.html"; }
        }

        function checkUserSession() {
            const loginContainer = document.getElementById('loginContainer');
            const user = localStorage.getItem('username');
            if (localStorage.getItem('isLoggedIn') === 'true' && user) {
                loginContainer.innerHTML = `<div class="flex items-center gap-3 bg-teal-50 dark:bg-slate-700 px-4 py-2 rounded-full font-bold text-sm text-slate-800 dark:text-white"><i class="fas fa-user-graduate text-teal-600"></i> أهلاً، <span class="text-orange-500">${user}</span> <button onclick="logout()" class="text-red-500 hover:text-red-700 mr-2"><i class="fas fa-sign-out-alt"></i></button></div>`;
            }
        }

        function logout() {
            if(confirm("تسجيل الخروج؟")) { localStorage.removeItem('isLoggedIn'); localStorage.removeItem('username'); window.location.reload(); }
        }

        async function loadSiteData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                if(data.whatsapp) document.getElementById('wa').href = data.whatsapp;
                if(data.facebook) document.getElementById('fb').href = data.facebook;
                if(data.youtube) document.getElementById('yt').href = data.youtube;
                if(data.tiktok) document.getElementById('tk').href = data.tiktok;
                
                const slider = document.getElementById('slider-container');
                if(data.sliderImages.length > 0) {
                    data.sliderImages.forEach((img, i) => slider.innerHTML += `<img src="${img}" class="slide ${i===0?'active':''}">`);
                    let slides = document.querySelectorAll('.slide'), current = 0;
                    setInterval(() => { slides[current].classList.remove('active'); current = (current + 1) % slides.length; slides[current].classList.add('active'); }, 5000);
                }
            } catch (e) {}
        }
        checkUserSession(); loadSiteData();
    </script>
</body>
</html>

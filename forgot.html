<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استرجاع كلمة المرور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-900">
    <div class="bg-white w-full max-w-md p-8 rounded-[2rem] shadow-2xl text-center">
        <h1 class="text-2xl font-black text-slate-800 mb-2">استرجاع كلمة المرور</h1>
        <p class="text-sm text-slate-500 mb-6">سنرسلها إلى رقم واتساب الخاص بك</p>
        <form onsubmit="handleRec(event)" class="space-y-4">
            <input type="text" id="user" required placeholder="اسم الحساب" class="w-full p-4 rounded-xl border-2 border-slate-100 bg-slate-50 outline-none focus:border-slate-800">
            <input type="tel" id="phone" required placeholder="رقم الواتساب (مثال: 010..)" class="w-full p-4 rounded-xl border-2 border-slate-100 bg-slate-50 outline-none focus:border-slate-800">
            <button type="submit" id="btn" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl">إرسال للواتساب</button>
        </form>
        <div id="res" class="mt-4 font-bold text-sm hidden p-3 rounded-xl"></div>
        <div class="mt-4 border-t pt-4"><a href="login.html" class="text-slate-500 text-sm font-bold">العودة</a></div>
    </div>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfqzIQ_MMoOOXebPNqRlCi_86IUbzppdTP6aUPjC64SL3Dibr7HUulvJH4P7IL4w/exec";
        function handleRec(e) {
            e.preventDefault(); const btn = document.getElementById('btn'), res = document.getElementById('res'); btn.innerText = 'جاري...'; btn.disabled = true; res.classList.add('hidden');
            fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "recover", username: document.getElementById('user').value, phone: document.getElementById('phone').value }) })
            .then(r => r.json()).then(data => {
                res.classList.remove('hidden', 'bg-red-50', 'text-red-700');
                if(data.status === "success") { res.className = 'mt-4 font-bold text-sm p-3 rounded-xl bg-green-50 text-green-700'; res.innerText = '✅ ' + data.message; btn.innerText = 'تم الإرسال'; }
                else { res.className = 'mt-4 font-bold text-sm p-3 rounded-xl bg-red-50 text-red-700'; res.innerText = '❌ ' + data.message; btn.innerText = 'إرسال'; btn.disabled = false; }
            }).catch(() => { res.className = 'mt-4 font-bold text-sm p-3 rounded-xl bg-red-50 text-red-700'; res.innerText = '❌ خطأ بالاتصال'; res.classList.remove('hidden'); btn.innerText = 'إرسال'; btn.disabled = false; });
        }
    </script>
</body>
</html>

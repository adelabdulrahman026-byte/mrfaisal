<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحديث | انتظرونا قريبًا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #3b0764);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            color: #fff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45 rgba(0, 0, 0, 0.2);
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-box {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
        }

        .gear {
            font-size: 5rem;
            color: #a855f7;
            animation: spin 4s linear infinite;
            display: inline-block;
            filter: drop-shadow(0 0 15px #a855f7);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 800;
            background: linear-gradient(to left, #f3e8ff, #c084fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .progress-container {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 4px;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-bar {
            width: 75%;
            height: 12px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-radius: 50px;
            position: relative;
            animation: progressAnimation 3s ease-in-out infinite alternate;
            box-shadow: 0 0 10px #a855f7;
        }

        @keyframes progressAnimation {
            0% { width: 50%; }
            100% { width: 85%; }
        }

        .glow-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(168, 85, 247, 0.15);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }

        .circle-1 { top: 10%; right: 15%; }
        .circle-2 { bottom: 10%; left: 15%; animation-delay: -3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .badge {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            font-size: 0.9rem;
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }
    </style>
</head>
<body>

    <div class="glow-circle circle-1"></div>
    <div class="glow-circle circle-2"></div>

    <div class="container">
        
        <div class="icon-box">
            <span class="gear">⚙️</span>
        </div>

        <h1>جاري عمل تحديث للموقع</h1>
        
        <p>نحن نعمل خلف الكواليس لنقدم لكم تجربة مستخدم فريدة ومميزات جديدة ومبتكرة. نعود إليكم أقوى قريباً!</p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="badge">
            ✨ انتظرونا قريباً جداً
        </div>

    </div>

</body>
</html>

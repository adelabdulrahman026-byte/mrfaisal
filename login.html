<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field:focus { background: rgba(255, 255, 255, 0.1); border-color: #14b8a6; box-shadow: 0 0 15px rgba(20, 184, 166, 0.3); }
        .fingerprint-btn { animation: pulse-shadow 2s infinite; }
        @keyframes pulse-shadow {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070')] bg-cover bg-center relative">
    
    <!-- التدرج السينمائي (Teal & Orange) -->
    <div class="absolute inset-0 bg-gradient-to-br from-teal-900/80 via-slate-900/90 to-orange-900/80 mix-blend-multiply z-0"></div>

    <div class="glass-card w-full max-w-md p-8 md:p-10 rounded-[2.5rem] shadow-2xl relative z-10 border-t-4 border-orange-500 text-center transform transition duration-500 hover:scale-[1.01]">
        
        <div class="w-20 h-20 mx-auto bg-gradient-to-br from-teal-500 to-orange-500 rounded-3xl flex items-center justify-center text-white text-3xl font-black mb-6 shadow-xl transform rotate-3">
            FA
        </div>
        <h1 class="text-3xl font-black text-white mb-2 tracking-wide">تسجيل الدخول</h1>
        <p class="text-slate-400 mb-8 text-sm">مرحباً بك في أحدث منصة تعليمية</p>

        <!-- زرار الدخول بالبصمة (يظهر فقط لمن فعلها) -->
        <div id="fingerprintSection" class="hidden mb-8">
            <button onclick="loginWithFingerprint()" class="fingerprint-btn w-full bg-slate-800 border-2 border-orange-500 text-orange-400 hover:bg-orange-500 hover:text-white font-bold py-4 rounded-2xl transition-all duration-300 flex flex-col items-center justify-center gap-2">
                <i class="fas fa-fingerprint text-4xl"></i>
                <span>الدخول السريع بالبصمة</span>
            </button>
            <div class="flex items-center gap-4 mt-6">
                <div class="h-px bg-slate-700 flex-1"></div>
                <span class="text-slate-500 text-sm font-bold">أو بالطريقة التقليدية</span>
                <div class="h-px bg-slate-700 flex-1"></div>
            </div>
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-5 text-right">
            <div>
                <label class="block font-bold text-teal-400 mb-2 text-sm ml-2">اسم المستخدم</label>
                <div class="relative">
                    <input type="text" id="username" required autocomplete="off" class="input-field w-full pl-4 pr-12 py-4 rounded-2xl outline-none transition transition-all duration-300">
                    <i class="fas fa-user absolute right-5 top-[18px] text-slate-400"></i>
                </div>
            </div>

            <div>
                <label class="block font-bold text-teal-400 mb-2 text-sm ml-2">كلمة المرور</label>
                <div class="relative">
                    <input type="password" id="password" required class="input-field w-full pl-4 pr-12 py-4 rounded-2xl outline-none transition transition-all duration-300">
                    <i class="fas fa-lock absolute right-5 top-[18px] text-slate-400"></i>
                </div>
            </div>

            <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-teal-500 to-teal-600 hover:from-teal-400 hover:to-teal-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg text-lg mt-4 flex items-center justify-center gap-3">
                دخول المنصة <i class="fas fa-arrow-left"></i>
            </button>
        </form>

        <div class="mt-6 flex justify-between text-sm font-bold px-2">
            <a href="forgot.html" class="text-slate-400 hover:text-orange-400 transition">نسيت كلمة المرور؟</a>
            <a href="register.html" class="text-teal-400 hover:text-teal-300 transition">إنشاء حساب</a>
        </div>
    </div>

    <!-- نافذة تفعيل البصمة (تظهر بعد الدخول لأول مرة) -->
    <div id="biometricModal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 p-8 rounded-[2rem] text-center max-w-sm w-full shadow-2xl">
            <i class="fas fa-fingerprint text-6xl text-orange-500 mb-4 animate-bounce"></i>
            <h2 class="text-2xl font-black text-white mb-2">تفعيل البصمة؟</h2>
            <p class="text-slate-400 text-sm mb-6">هل ترغب في استخدام بصمة الإصبع أو الوجه لتسجيل الدخول أسرع في المرات القادمة؟</p>
            <div class="space-y-3">
                <button onclick="setupFingerprint()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition">نعم، فعل البصمة</button>
                <button onclick="skipFingerprint()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition">لا شكراً، ربما لاحقاً</button>
            </div>
        </div>
    </div>

    <script>
        // رابط جوجل سكريبت
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz59YP6aXkyPVrqBQ4UBXHY1I_O47An-7PIjrA87QnOAm0OsklF6yA78d-ZBEn63cI/exec";
        
        // التحقق من دعم المتصفح للبصمة
        const isWebAuthnSupported = window.PublicKeyCredential !== undefined;
        
        // التحقق عند فتح الصفحة إذا كان الطالب مفعل البصمة سابقاً
        window.onload = () => {
            if (localStorage.getItem("fingerprintEnabled") === "true" && isWebAuthnSupported) {
                document.getElementById('fingerprintSection').classList.remove('hidden');
            }
        };

        // 1. تسجيل الدخول التقليدي
        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
            btn.disabled = true;

            fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "login", username: user, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    localStorage.setItem("tempUser", user); // حفظ مؤقت
                    
                    // لو جهازه بيدعم البصمة وهو مش مفعلها، نعرضله رسالة التفعيل
                    if (isWebAuthnSupported && localStorage.getItem("fingerprintEnabled") !== "true") {
                        document.getElementById('biometricModal').classList.remove('hidden');
                    } else {
                        finishLogin(user);
                    }
                } else {
                    btn.innerHTML = '❌ ' + data.message;
                    btn.classList.add('bg-red-500');
                    setTimeout(() => { btn.innerHTML = 'دخول المنصة <i class="fas fa-arrow-left"></i>'; btn.disabled = false; btn.classList.remove('bg-red-500'); }, 2000);
                }
            }).catch(() => {
                btn.innerHTML = '❌ خطأ في الاتصال';
                setTimeout(() => { btn.innerHTML = 'دخول المنصة <i class="fas fa-arrow-left"></i>'; btn.disabled = false; }, 2000);
            });
        }

        // 2. إعداد وتفعيل البصمة لأول مرة
        async function setupFingerprint() {
            const user = localStorage.getItem("tempUser");
            try {
                // استدعاء نظام الحماية في الموبايل
                const publicKeyCredentialCreationOptions = {
                    challenge: Uint8Array.from("faisal_academy_secure_challenge_" + Date.now(), c => c.charCodeAt(0)),
                    rp: { name: "فيصل أكاديمي" },
                    user: { id: Uint8Array.from(user, c => c.charCodeAt(0)), name: user, displayName: user },
                    pubKeyCredParams: [{alg: -7, type: "public-key"}, {alg: -257, type: "public-key"}],
                    authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                    timeout: 60000
                };
                
                await navigator.credentials.create({ publicKey: publicKeyCredentialCreationOptions });
                
                // لو البصمة اتسجلت بنجاح
                localStorage.setItem("fingerprintEnabled", "true");
                localStorage.setItem("savedUserForBiometric", user);
                alert("✅ تم ربط حسابك ببصمة جهازك بنجاح!");
                finishLogin(user);
            } catch (err) {
                alert("⚠️ لم يتم تفعيل البصمة، يمكنك المحاولة لاحقاً.");
                finishLogin(user);
            }
        }

        // تخطي خطوة البصمة
        function skipFingerprint() {
            const user = localStorage.getItem("tempUser");
            finishLogin(user);
        }

        // إنهاء الدخول وتحويل الطالب للمنصة
        function finishLogin(username) {
            localStorage.setItem("isLoggedIn", "true");
            localStorage.setItem("username", username);
            window.location.href = "index.html";
        }

        // 3. الدخول السريع باستخدام البصمة المبرمجة سابقاً
        async function loginWithFingerprint() {
            const btn = document.querySelector('.fingerprint-btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin text-4xl"></i><br>جاري قراءة البصمة...';
            
            try {
                const publicKeyCredentialRequestOptions = {
                    challenge: Uint8Array.from("faisal_academy_secure_challenge_" + Date.now(), c => c.charCodeAt(0)),
                    userVerification: "required",
                    timeout: 60000
                };
                
                await navigator.credentials.get({ publicKey: publicKeyCredentialRequestOptions });
                
                // لو قراءة البصمة نجحت
                const user = localStorage.getItem("savedUserForBiometric");
                btn.classList.replace('bg-slate-800', 'bg-green-600');
                btn.innerHTML = '<i class="fas fa-check-circle text-4xl"></i><br>تمت المطابقة بنجاح!';
                
                setTimeout(() => { finishLogin(user); }, 1000);
            } catch (err) {
                btn.innerHTML = '<i class="fas fa-times-circle text-4xl text-red-500"></i><br><span class="text-red-500">فشلت المطابقة!</span>';
                setTimeout(() => { btn.innerHTML = originalContent; }, 2000);
            }
        }
    </script>
</body>
</html>

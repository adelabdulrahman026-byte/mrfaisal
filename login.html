<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول | فيصل أكاديمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-900">
    <div class="bg-white w-full max-w-md p-8 rounded-[2rem] shadow-2xl text-center">
        <h1 class="text-3xl font-black text-slate-800 mb-6">تسجيل الدخول</h1>
        <form onsubmit="handleLogin(event)" class="space-y-4">
            <input type="text" id="username" required placeholder="اسم المستخدم" class="w-full p-4 rounded-xl border-2 border-slate-100 bg-slate-50 outline-none focus:border-teal-500">
            <input type="password" id="password" required placeholder="كلمة المرور" class="w-full p-4 rounded-xl border-2 border-slate-100 bg-slate-50 outline-none focus:border-teal-500">
            <button type="submit" id="btn" class="w-full bg-teal-500 text-white font-bold py-4 rounded-xl">دخول</button>
        </form>
        <div class="mt-4 flex justify-between text-sm font-bold">
            <a href="forgot.html" class="text-slate-500">نسيت كلمة المرور؟</a>
            <a href="register.html" class="text-orange-500">إنشاء حساب</a>
        </div>
        <div class="mt-4 border-t pt-4"><a href="index.html" class="text-slate-400 text-sm">العودة للرئيسية</a></div>
    </div>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfqzIQ_MMoOOXebPNqRlCi_86IUbzppdTP6aUPjC64SL3Dibr7HUulvJH4P7IL4w/exec";
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn'), user = document.getElementById('username').value, pass = document.getElementById('password').value;
            btn.innerHTML = 'جاري التحقق...'; btn.disabled = true;
            fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "login", username: user, password: pass }) })
            .then(res => res.json()).then(data => {
                if(data.status === "success") {
                    localStorage.setItem("isLoggedIn", "true"); localStorage.setItem("username", user);
                    btn.className = "w-full bg-green-500 text-white font-bold py-4 rounded-xl"; btn.innerHTML = '✅ تم الدخول';
                    setTimeout(() => window.location.href = "index.html", 1000);
                } else { btn.className = "w-full bg-red-500 text-white font-bold py-4 rounded-xl"; btn.innerHTML = '❌ ' + data.message; setTimeout(() => { btn.className = "w-full bg-teal-500 text-white font-bold py-4 rounded-xl"; btn.innerHTML = 'دخول'; btn.disabled = false; }, 2000); }
            }).catch(() => { btn.innerHTML = '❌ خطأ بالاتصال'; setTimeout(() => { btn.innerHTML = 'دخول'; btn.disabled = false; }, 2000); });
        }
    </script>
</body>
</html>

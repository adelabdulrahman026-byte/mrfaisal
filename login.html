<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | فيصل أكاديمي</title>
    <!-- مكتبات التصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); }
        .input-icon { transition: all 0.3s ease; }
        input:focus + .input-icon { color: #0d9488; transform: scale(1.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[url('https://images.unsplash.com/photo-1497646650708-244018b14c33')] bg-cover bg-center relative overflow-hidden">
    
    <!-- طبقة تعتيم الخلفية لإبراز الكارت -->
    <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-sm z-0"></div>

    <!-- كارت تسجيل الدخول -->
    <div class="glass-card w-full max-w-md p-8 md:p-10 rounded-[2.5rem] shadow-2xl relative z-10 border-t-8 border-teal-500 transform transition-all hover:shadow-teal-500/20">
        
        <div class="text-center mb-10">
            <div class="w-20 h-20 mx-auto bg-gradient-to-br from-teal-500 to-orange-500 rounded-[1.5rem] flex items-center justify-center text-white text-3xl font-black mb-5 shadow-lg transform rotate-3 hover:rotate-0 transition-transform">
                FA
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">مرحباً بك مجدداً</h1>
            <p class="text-slate-500 mt-2 font-medium">سجل دخولك بحساب المتجر الخاص بك</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
            <!-- خانة اسم المستخدم -->
            <div>
                <label class="block font-bold text-slate-700 mb-2 text-sm">اسم المستخدم</label>
                <div class="relative group">
                    <input type="text" id="username" required autocomplete="off" placeholder="اكتب اليوزر نيم هنا..." class="w-full pl-4 pr-12 py-4 rounded-2xl border-2 border-slate-100 focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition bg-slate-50/50 font-medium text-slate-700">
                    <i class="fas fa-user absolute right-4 top-[18px] text-slate-400 input-icon text-lg"></i>
                </div>
            </div>

            <!-- خانة كلمة المرور -->
            <div>
                <label class="block font-bold text-slate-700 mb-2 text-sm">كلمة المرور</label>
                <div class="relative group">
                    <input type="password" id="password" required placeholder="اكتب الباسورد هنا..." class="w-full pl-4 pr-12 py-4 rounded-2xl border-2 border-slate-100 focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition bg-slate-50/50 font-medium text-slate-700">
                    <i class="fas fa-lock absolute right-4 top-[18px] text-slate-400 input-icon text-lg"></i>
                </div>
            </div>

            <!-- زرار الدخول -->
            <button type="submit" id="submitBtn" class="w-full mt-4 bg-gradient-to-r from-teal-500 to-teal-600 hover:from-orange-500 hover:to-orange-600 text-white font-bold py-4 rounded-2xl transition-all duration-300 transform hover:-translate-y-1 shadow-lg shadow-teal-500/30 text-xl flex justify-center items-center gap-3">
                <span>تسجيل الدخول</span> <i class="fas fa-sign-in-alt"></i>
            </button>
        </form>

        <div class="mt-8 text-center pt-6 border-t border-slate-200/60">
            <p class="text-slate-500 text-sm">ليس لديك حساب؟ <a href="https://wa.me/201093139047" class="text-orange-500 font-bold hover:text-teal-600 transition ml-1">تواصل مع الدعم الفني</a></p>
        </div>
        
        <div class="mt-4 text-center">
            <a href="index.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-slate-700 transition font-medium text-sm bg-slate-100 px-4 py-2 rounded-full hover:bg-slate-200">
                <i class="fas fa-arrow-right"></i> العودة للرئيسية
            </a>
        </div>
    </div>

    <script>
        // رابط جوجل سكريبت بتاعك
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxsfpS5rsmrGjXOkopJLpkZTQwAxQMaUREcPsT0GuuZ5OOnxkCwm0jDpzwtdL0InSA/exec";

        function handleLogin(e) {
            e.preventDefault(); 
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('submitBtn');

            // تغيير شكل الزرار وقت التحميل
            btn.innerHTML = '<i class="fas fa-spinner fa-spin text-2xl"></i> جاري التحقق من بياناتك...';
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            const payload = {
                action: "login",
                username: user,
                password: pass
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // نتخطى مشاكل الـ CORS للموبايل
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            })
            .then(() => {
                // حفظ بيانات الجلسة عشان يفتح المتجر من الصفحة الرئيسية
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("username", user);
                
                // أنيميشن النجاح
                btn.classList.remove('from-teal-500', 'to-teal-600', 'opacity-80', 'cursor-not-allowed');
                btn.classList.add('bg-green-500');
                btn.innerHTML = '✅ تم الدخول بنجاح! جاري التوجيه...';
                
                // تحويل للرئيسية بعد ثانية
                setTimeout(() => {
                    window.location.href = "index.html"; 
                }, 1500);
            })
            .catch(err => {
                // أنيميشن الخطأ
                btn.classList.remove('from-teal-500', 'to-teal-600', 'opacity-80', 'cursor-not-allowed');
                btn.classList.add('bg-red-500');
                btn.innerHTML = '❌ خطأ في الاتصال بالسيرفر';
                
                // إرجاع الزرار لشكله الطبيعي بعد ثانيتين
                setTimeout(() => {
                    btn.disabled = false;
                    btn.classList.remove('bg-red-500');
                    btn.classList.add('from-teal-500', 'to-teal-600');
                    btn.innerHTML = '<span>تسجيل الدخول</span> <i class="fas fa-sign-in-alt"></i>';
                }, 2500);
            });
        }
    </script>
</body>
</html>

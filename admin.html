<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | فيصل أكاديمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-3xl shadow-2xl border-t-4 border-teal-500">
        <h1 class="text-3xl font-bold mb-8 text-slate-800">إدارة الموقع</h1>
        
        <div class="space-y-6">
            <div><label class="block font-bold mb-2">رابط واتساب</label><input type="text" id="wa" class="w-full border p-3 rounded-lg"></div>
            <div><label class="block font-bold mb-2">رابط فيسبوك</label><input type="text" id="fb" class="w-full border p-3 rounded-lg"></div>
            <div><label class="block font-bold mb-2">رابط يوتيوب</label><input type="text" id="yt" class="w-full border p-3 rounded-lg"></div>
            <div><label class="block font-bold mb-2">رابط تيك توك</label><input type="text" id="tk" class="w-full border p-3 rounded-lg"></div>
            
            <div class="pt-6 border-t border-gray-200">
                <label class="block font-bold mb-2 text-orange-500">روابط صور السلايد شو (افصل بين كل رابط بفاصلة , )</label>
                <textarea id="slider" class="w-full border p-3 rounded-lg h-32" placeholder="رابط صورة 1, رابط صورة 2"></textarea>
            </div>

            <button onclick="saveData()" class="w-full bg-teal-600 hover:bg-orange-500 text-white font-bold py-4 rounded-xl transition text-xl">حفظ التعديلات في الموقع</button>
            <p class="text-center text-sm text-gray-500 mt-4">* بالنسبة للإشعارات، التيم بيدخل على لوحة تحكم موقع OneSignal ويبعت الإشعار مباشرة لكل الطلاب.</p>
        </div>
    </div>

    <script>
        function saveData() {
            // هنا بيتبعت الـ Request لجوجل سكريبت عشان يحفظ البيانات
            const payload = {
                whatsapp: document.getElementById('wa').value,
                facebook: document.getElementById('fb').value,
                youtube: document.getElementById('yt').value,
                tiktok: document.getElementById('tk').value,
                sliderImages: document.getElementById('slider').value.split(',').map(s => s.trim())
            };
            
            // الكود ده هيشتغل لما تحط رابط الـ API بتاعك
            /*
            fetch("https://script.google.com/macros/s/AKfycbxYT-8j-y7UafqryHzXmuBJcLaXPQR11ph49Aqka69QXY4TkI-2Lej8NSs7sbODTWs/exec", { method: 'POST', body: JSON.stringify(payload) })
            .then(res => alert('تم تحديث الموقع بنجاح!'));
            */
            alert('تم تجهيز البيانات، اربط بجوجل سكريبت لتفعيل الحفظ!');
        }
    </script>
</body>
</html>
